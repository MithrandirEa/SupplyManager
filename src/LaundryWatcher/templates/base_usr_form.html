{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Accueil - LaundryWatcher{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
        }
        footer {
            margin-top: auto;
            padding: 1rem 0;
            text-align: center;
        }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <nav class="navbar navbar-expand-lg navbar-light sticky-top shadows-sm py-2"
        style="background-color: rgb(230, 179, 170); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);"> 
        <div class="container-fluid px-4">
            <a class="navbar-brand d-none d-lg-block" href="{% url 'home' %}">
                <h1 class="display-6 fw-bolder text-black mb-0"
                style="text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);">
                LaundryWatcher
                </h1>
            </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        </div>
    </nav>      
    {% endif %}
    
    <main>
        {% block content %}
        {% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2026 LaundryWatcher - Created by SCIPION Clément</p>
    </footer>
</body>

</html>
