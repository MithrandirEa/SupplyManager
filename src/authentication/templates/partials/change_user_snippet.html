{% load static %}

<!-- Formulaire de modification d'un utilisateur -->
<div class="container mt-4">
    <h2 class="mb-4">Modifier l'utilisateur</h2>
    <div class="card shadow-sm">
        <div class="card-body p-5">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="{{ form.username.id_for_label }}" class="form-label">{{ form.username.label }} :</label>
                    {{ form.username }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.email.id_for_label }}" class="form-label">{{ form.email.label }} :</label>
                    {{ form.email }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.role.id_for_label }}" class="form-label">{{ form.role.label }} :</label>
                    {{ form.role }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.date_start_contract.id_for_label }}" class="form-label">{{ form.date_start_contract.label }} :</label>
                    {{ form.date_start_contract }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.date_end_contract.id_for_label }}" class="form-label">{{ form.date_end_contract.label }} :</label>
                    {{ form.date_end_contract }}
                </div>
                
                <div class="mb-3">
                    <label for="{{ form.still_active.id_for_label }}" class="form-label">{{ form.still_active.label }} :</label>
                    {{ form.still_active }}
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">Modifier l'utilisateur</button>
                </div>
            </form>
        </div>
    </div>
</div>
