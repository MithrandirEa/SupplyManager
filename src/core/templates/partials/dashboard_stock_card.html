<!-- Stock Card Partial - Affiche une card pour un item de stock -->
{% load static %}

<div class="card h-100 border-{{ card_color|default:'primary' }}">
    <div class="card-header bg-{{ card_color|default:'primary' }} text-white">
        <h5 class="mb-0">
            <i class="bi bi-{{ icon|default:'box-seam' }}"></i>
            {{ title }}
        </h5>
    </div>
    <div class="card-body">
        {% if items %}
        <div class="table-responsive">
            <table class="table table-sm table-hover">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Catégorie</th>
                        <th class="text-end">{{ quantity_label|default:'Quantité' }}</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in items %}
                    <tr>
                        <td>{{ item.name }}</td>
                        <td>
                            <span class="badge bg-secondary">
                                {{ item.category.name }}
                            </span>
                        </td>
                        <td class="text-end">
                            <span class="badge bg-{{ badge_color|default:'primary' }}">
                                {{ item.quantity_value|default:item.total_quantity }}
                            </span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="text-center text-muted py-4">
            <i class="bi bi-{{ empty_icon|default:'check-circle' }} fs-1"></i>
            <p class="mb-0 mt-2">{{ empty_message|default:'Aucun élément' }}</p>
        </div>
        {% endif %}
    </div>
</div>
