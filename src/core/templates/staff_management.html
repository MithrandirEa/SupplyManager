{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Affiche la liste des utilisateurs selon leur rôles (Admin, Responsable, Équipe) -->
<div class="container mt-4">
    <h2 class="mb-4">Gestion du personnel</h2>
    <div class="mb-3">
        <a href="{% url 'create_user' %}" class="btn btn-success">Créer un nouvel utilisateur</a>
    </div>
    <div class="table-responsive">
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Nom d'utilisateur</th>
                    <th>Rôle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.get_role_display }}</td>
                    <td>
                        <a href="{% url 'change_user' user_id=user.id %}" class="btn btn-sm btn-primary">Modifier</a>
                        <a href="{% url 'delete_user' user_id=user.id %}" class="btn btn-sm btn-danger">Supprimer</a>
                        <!-- Ajoutez d'autres actions si nécessaire -->
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>


{% endblock %}
